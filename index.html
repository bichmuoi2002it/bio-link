<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết nối an toàn</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; }
        .btn { 
            display: block; background: #0068ff; color: white; text-decoration: none; 
            padding: 18px; border-radius: 50px; font-weight: bold; font-size: 18px;
            margin-top: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 104, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(0, 104, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 104, 255, 0); }
        }
        p { color: #666; font-size: 15px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-bottom: 10px;">Xin chào bác!</h2>
        <p>Để đảm bảo an toàn và xem được đầy đủ hình ảnh, bác vui lòng bấm nút bên dưới:</p>
        
        <a href="intent://beacons.ai/trangsucphongthuythanhhuy#Intent;scheme=https;package=com.android.chrome;end" class="btn" id="openLink"> BẤM VÀO ĐÂY ĐỂ XEM </a>
        
        <p style="margin-top: 20px; font-size: 12px; color: #999;">(Tự động mở bằng Google Chrome hoặc Safari)</p>
    </div>

    <script>
        const targetUrl = "https://beacons.ai/trangsucphongthuythanhhuy";
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        // Nếu khách dùng iPhone, nút bấm sẽ đổi link thành link thường 
        // nhưng sẽ kèm theo lệnh qua Google để kích thích Safari mở
        if (isIOS) {
            document.getElementById('openLink').href = "https://www.google.com/url?q=" + encodeURIComponent(targetUrl);
        }

        // Vẫn giữ lệnh tự động mở cho các máy đời thấp hoặc trình duyệt chưa chặn gắt
        window.onload = function() {
            setTimeout(() => {
                if (isAndroid) {
                    window.location.href = document.getElementById('openLink').href;
                }
            }, 1500);
        };
    </script>
</body>
</html>
