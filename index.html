<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng...</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p>Đang kiểm tra bảo mật...</p>

    <script>
        // Link Zalo cuối cùng
        const targetUrl = "https://zalo.me/0326883988";
        
        // Tạo một link trung gian qua Google để "tẩy sạch" referrer của TikTok
        // Cách này đánh lừa trình duyệt TikTok rằng người dùng đang đi sang Google
        const googleRedirect = "https://www.google.com/url?q=" + encodeURIComponent(targetUrl);

        function redirect() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);
            const isTikTok = /TikTok/i.test(ua);

            if (isTikTok) {
                if (isAndroid) {
                    // Đối với Android: Dùng Intent để ÉP mở bằng Chrome thay vì trình duyệt TikTok
                    // Khi sang Chrome, nó sẽ tự động nhận diện và mở app Zalo
                    window.location.href = "intent://zalo.me/0326883988#Intent;scheme=https;package=com.android.chrome;end";
                } else {
                    // Đối với iPhone: Chuyển hướng qua Google trước
                    window.location.replace(googleRedirect);
                }
            } else {
                // Nếu đã thoát ra ngoài trình duyệt thường, nhảy thẳng vào Zalo
                window.location.replace(targetUrl);
            }
        }

        // Đợi 1 giây để giả lập kiểm tra bảo mật (tránh bot TikTok quét lệnh nhảy ngay lập tức)
        setTimeout(redirect, 1000);
    </script>
</body>
</html>
