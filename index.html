<script>
    window.onload = function() {
        const zaloUrl = "https://zalo.me/0869967989";
        const intentUrl = "intent://zalo.me/0326883988#Intent;scheme=https;package=com.android.chrome;end";

        // Kiểm tra nếu là trình duyệt nội bộ của TikTok/Facebook
        const isInternal = /TikTok|FBAN|FBAV/i.test(navigator.userAgent);

        if (isInternal) {
            // Nếu là Android, ép mở Chrome
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = intentUrl;
            } else {
                // Nếu là iOS, chỉ có cách nhắc họ bấm 3 chấm
                alert("Bạn vui lòng bấm vào dấu 3 chấm góc trên bên phải, sau đó chọn 'Mở bằng trình duyệt' để vào Zalo nhé!");
            }
        } else {
            // Nếu đã ở trình duyệt ngoài, mở thẳng Zalo
            window.location.href = "zalo://qr/p/0869967989";
            setTimeout(() => { window.location.href = zaloUrl; }, 1000);
        }
    };
</script>
