<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Làm cái nút to bằng cả cái màn hình điện thoại */
        .giant-button {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0068ff; color: white; display: flex; 
            align-items: center; justify-content: center;
            text-decoration: none; font-family: sans-serif;
            font-size: 25px; font-weight: bold; text-align: center;
            border: none; cursor: pointer; line-height: 1.5; padding: 20px;
        }
    </style>
</head>
<body>

    <a href="intent://beacons.ai/trangsucphongthuythanhhuy#Intent;scheme=https;package=com.android.chrome;end" class="giant-button">
        BẤM VÀO ĐÂY <br> ĐỂ XEM CHI TIẾT <br> (TRÊN GOOGLE)
    </a>

    <script>
        // Backup cho iPhone: Nếu khách bấm vào cái nút trên iPhone
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            document.querySelector('.giant-button').href = "https://www.google.com/url?q=https://beacons.ai/trangsucphongthuythanhhuy";
        }
    </script>
</body>
</html>
