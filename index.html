<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chuyển hướng...</title>
</head>
<body>
    <script>
        (function() {
            var targetUrl = "https://beacons.ai/trangsucphongthuythanhhuy";
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // 1. Xử lý cho ANDROID: Ép mở bằng Chrome
            if (/Android/i.test(ua)) {
                // Giao thức Intent mạnh nhất để ép mở Chrome
                var intentUrl = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.href = intentUrl;
                
                // Nếu sau 1.5 giây không thoát được (do máy không có Chrome), thì nhảy link thường
                setTimeout(function() {
                    window.location.href = targetUrl;
                }, 1500);
            } 
            
            // 2. Xử lý cho IOS (iPhone): Dùng mẹo "Content-Disposition" giả lập
            else if (/iPhone|iPad|iPod/i.test(ua)) {
                // Kiểm tra nếu đang trong trình duyệt nội bộ (TikTok, Zalo, FB)
                if (ua.includes("TikTok") || ua.includes("FBAN") || ua.includes("FBAV")) {
                    // Mẹo: Dẫn qua một link trung gian của Google nhưng ép mở kiểu mới
                    var googleRedirect = "https://www.google.com/url?q=" + encodeURIComponent(targetUrl);
                    window.location.assign(googleRedirect);
                } else {
                    window.location.replace(targetUrl);
                }
            } 
            
            // 3. Các thiết bị khác
            else {
                window.location.replace(targetUrl);
            }
        })();
    </script>
    
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>Đang mở bằng trình duyệt hệ thống...</p>
        <p>Nếu không tự chuyển, vui lòng bấm <a href="https://beacons.ai/trangsucphongthuythanhhuy">VÀO ĐÂY</a></p>
    </div>
</body>
</html>
