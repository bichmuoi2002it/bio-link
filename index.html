<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiếp tục đến trang...</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        /* Tạo một nút bấm khổng lồ bao phủ toàn bộ màn hình */
        .overlay-button {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; text-decoration: none; color: #333; text-align: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%);
        }
        .icon-circle {
            width: 80px; height: 80px; background: #0068ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,104,255,0.4);
            animation: pulse 1.5s infinite;
        }
        .icon-circle svg { width: 40px; fill: white; }
        h2 { font-family: sans-serif; font-size: 22px; margin: 10px 20px; color: #000; }
        p { font-family: sans-serif; font-size: 16px; color: #666; margin: 0 30px; line-height: 1.4; }
        .hint { margin-top: 50px; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <a href="#" id="bigLink" class="overlay-button">
        <div class="icon-circle">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
        </div>
        <h2>CHẠM ĐỂ XEM CHI TIẾT</h2>
        <p>Bác vui lòng chạm tay vào màn hình để kết nối với Zalo của em nhé!</p>
        <div class="hint">An toàn 100% - Bảo mật bởi Google</div>
    </a>

    <script>
        const finalUrl = "https://beacons.ai/trangsucphongthuythanhhuy";
        const btn = document.getElementById('bigLink');
        const ua = navigator.userAgent || navigator.vendor || window.opera;

        // Xử lý lệnh khi khách CHẠM vào màn hình
        btn.onclick = function(e) {
            e.preventDefault();
            
            if (/Android/i.test(ua)) {
                // Lệnh Android: Ép mở Chrome (Intent)
                window.location.href = "intent://" + finalUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                // Lệnh iOS: Chuyển qua Google để Safari tự nhận diện
                window.location.href = "https://www.google.com/url?q=" + encodeURIComponent(finalUrl);
            } else {
                window.location.href = finalUrl;
            }
        };

        // Vẫn giữ một lệnh tự động sau 2 giây cho các máy đời cũ chưa chặn gắt
        setTimeout(() => {
            if (/Android/i.test(ua) && (ua.includes("TikTok") || ua.includes("Zalo"))) {
                 window.location.href = "intent://" + finalUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            }
        }, 2000);
    </script>
</body>
</html>
